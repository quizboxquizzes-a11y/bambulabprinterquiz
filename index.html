<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bambu Lab Configuration Matcher</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🖨️</text></svg>">
    <style>
        :root {
            --bg-color: #0d1117;
            --container-bg: #161b22;
            --text-color: #c9d1d9;
            --accent-color: #2ea44f;
            --accent-hover: #238636;
            --border-color: #30363d;
            --card-hover: #21262d;
            --selected-border: #58a6ff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .quiz-container {
            background-color: var(--container-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 32px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
        }

        h1, h2, h3 {
            color: #fff;
            font-weight: 600;
        }

        h1 { font-size: 24px; text-align: center; margin-bottom: 8px; }
        .subtitle { text-align: center; color: #8b949e; margin-bottom: 24px; font-size: 14px; }

        .screen { display: none; }
        .screen.active { display: block; }

        .btn {
            background-color: var(--accent-color);
            color: white;
            border: 1px solid rgba(240,246,252,0.1);
            border-radius: 6px;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
        }

        .btn:hover { background-color: var(--accent-hover); }
        .btn:disabled { background-color: #21262d; color: #8b949e; cursor: not-allowed; border-color: var(--border-color); }

        .options-list { display: flex; flex-direction: column; gap: 12px; margin: 20px 0; }

        .option-card {
            background-color: var(--container-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 16px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .option-card:hover { background-color: var(--card-hover); }
        .option-card.selected { border-color: var(--selected-border); background-color: #1f2937; }

        .progress-bar-container { background-color: var(--border-color); height: 4px; border-radius: 2px; margin-bottom: 24px; overflow: hidden; }
        .progress-bar { background-color: var(--accent-color); height: 100%; width: 0%; transition: width 0.3s ease; }

        .nav-buttons { display: flex; gap: 12px; margin-top: 20px; }
        .btn-secondary { background-color: #21262d; color: #c9d1d9; border: 1px solid var(--border-color); }
        .btn-secondary:hover { background-color: #30363d; }

        .result-box { border: 1px solid var(--accent-color); background-color: rgba(46, 164, 79, 0.1); padding: 20px; border-radius: 6px; text-align: center; margin-top: 20px; }
        .result-title { font-size: 22px; color: #fff; font-weight: 700; }
        .feature-tag { display: inline-block; background: #21262d; border: 1px solid var(--border-color); padding: 4px 8px; border-radius: 4px; font-size: 12px; margin: 4px; }
    </style>
</head>
<body>

<div class="quiz-container">
    <div id="intro-screen" class="screen active">
        <h1>Bambu Lab Picker</h1>
        <div class="subtitle">Hardware Matcher Framework</div>
        <p style="line-height: 1.6; font-size: 14px; color: #8b949e; text-align: center; margin-bottom: 30px;">
            Filter down to your exact 3D printer and hardware package based on workspace requirements, material layout needs, and specific tool features.
        </p>
        <button class="btn" onclick="startQuiz()">Start Configuration</button>
    </div>

    <div id="quiz-screen" class="screen">
        <div class="progress-bar-container">
            <div id="progress" class="progress-bar"></div>
        </div>
        <h3 id="question-text" style="margin-top: 0;">Loading question...</h3>
        <div id="options-container" class="options-list"></div>
        
        <div class="nav-buttons">
            <button id="back-btn" class="btn btn-secondary" onclick="goBack()">Back</button>
            <button id="next-btn" class="btn" onclick="goNext()" disabled>Next Step</button>
        </div>
    </div>

    <div id="results-screen" class="screen">
        <h1>Your Match</h1>
        <div class="subtitle">Optimal physical configuration:</div>
        <div class="result-box">
            <div id="match-name" class="result-title">Calculating...</div>
        </div>
        <div id="match-details" style="margin-top: 20px; font-size: 14px; color: #8b949e; line-height: 1.5;"></div>
        <button class="btn btn-secondary" style="margin-top: 24px;" onclick="resetQuiz()">Restart Quiz</button>
    </div>
</div>

<script>
    let currentQuestionIndex = 0;
    let userSelections = {};
    let historyStack = [];
    let temporarySelection = null;

    const questions = [
        {
            key: "form_factor",
            text: "What tier of print architecture and workspace envelope do you need?",
            options: [
                { text: "Entry-Level Bed-Slinger (Compact & Open)", value: "A" },
                { text: "Mid-to-High Tier Enclosed CoreXY (Fast, enclosed desktop sizes)", value: "P_X" },
                { text: "Large Format / Enterprise Platform (Massive volume, high-temp environments)", value: "H" }
            ]
        },
        {
            key: "materials",
            text: "What type of technical filaments do you intend to run regularly?",
            options: [
                { text: "Basic elements (PLA, PETG, TPU Only)", value: "basic" },
                { text: "Enclosed engineering parts (ABS, ASA, PA, PC, Carbon Fiber)", value: "advanced" },
                { text: "Ultra-spec engineering / Cross-Material systems (Active chamber heating or multi-nozzle swaps)", value: "extreme" }
            ]
        },
        {
            key: "budget_tier",
            text: "Which class of machine fits your deployment setting?",
            options: [
                { text: "Cost-sensitive / Desktop Hobbyist", value: "budget" },
                { text: "High-Performance Workhorse (Maximum speed & standard production)", value: "performance" },
                { text: "Enterprise Flagship / Lab Environment (Advanced data compliance, active heating)", value: "flagship" }
            ]
        },
        {
            key: "size_need",
            text: "What are your minimum build volume expectations?",
            options: [
                { text: "Small format is fine (Up to 180mm³)", value: "small" },
                { text: "Standard desktop format (Around 256mm³)", value: "standard" },
                { text: "Over-sized workspace volume (Up to 330mm³)", value: "large" }
            ]
        },
        {
            key: "ams_needed",
            text: "Do you require an automatic material configuration system (AMS) for multi-color or support material printing?",
            options: [
                { text: "Yes, I want the system bundled with an AMS unit", value: "yes" },
                { text: "No, standalone single-spool printing is sufficient", value: "no" }
            ]
        },
        {
            key: "laser_needed",
            text: "Do you need integrated laser engraving/cutting hardware modules?",
            options: [
                { text: "No laser functionality needed", value: "none" },
                { text: "Yes, standard 10W entry laser utility", value: "10w" },
                { text: "Yes, high-power 40W production laser utility", value: "40w" }
            ]
        }
    ];

    function startQuiz() {
        document.getElementById('intro-screen').classList.remove('active');
        document.getElementById('quiz-screen').classList.add('active');
        currentQuestionIndex = 0;
        userSelections = {};
        historyStack = [];
        temporarySelection = null;
        renderQuestion();
    }

    function renderQuestion() {
        if (currentQuestionIndex >= questions.length) {
            calculateResult();
            return;
        }

        const q = questions[currentQuestionIndex];
        
        // Smart dynamic skip logic: skip laser question if they didn't choose H platform
        if (q.key === "laser_needed" && userSelections["form_factor"] !== "H") {
            userSelections["laser_needed"] = "none";
            currentQuestionIndex++;
            renderQuestion();
            return;
        }

        document.getElementById('question-text').innerText = q.text;
        document.getElementById('back-btn').style.visibility = historyStack.length > 0 ? 'visible' : 'hidden';
        document.getElementById('next-btn').disabled = true;
        temporarySelection = null;

        const progressPercent = (currentQuestionIndex / questions.length) * 100;
        document.getElementById('progress').style.width = `${progressPercent}%`;

        const optionsContainer = document.getElementById('options-container');
        optionsContainer.innerHTML = '';

        q.options.forEach(opt => {
            const card = document.createElement('div');
            card.className = 'option-card';
            card.innerText = opt.text;
            
            if (userSelections[q.key] === opt.value) {
                card.classList.add('selected');
                temporarySelection = opt.value;
                document.getElementById('next-btn').disabled = false;
            }

            card.onclick = () => {
                document.querySelectorAll('.option-card').forEach(c => c.classList.remove('selected'));
                card.classList.add('selected');
                temporarySelection = opt.value;
                document.getElementById('next-btn').disabled = false;
            };
            optionsContainer.appendChild(card);
        });
    }

    function goNext() {
        if (!temporarySelection) return;
        const q = questions[currentQuestionIndex];
        userSelections[q.key] = temporarySelection;
        historyStack.push(currentQuestionIndex);
        currentQuestionIndex++;
        renderQuestion();
    }

    function goBack() {
        if (historyStack.length === 0) return;
        currentQuestionIndex = historyStack.pop();
        renderQuestion();
    }

    function calculateResult() {
        document.getElementById('quiz-screen').classList.remove('active');
        document.getElementById('results-screen').classList.add('active');

        let match = "P1S Combo (With AMS)"; 
        let details = "";

        const f = userSelections.form_factor;
        const m = userSelections.materials;
        const b = userSelections.budget_tier;
        const s = userSelections.size_need;
        const ams = userSelections.ams_needed;
        const laser = userSelections.laser_needed;

        if (f === "A" || s === "small" || (b === "budget" && f !== "H")) {
            if (s === "small") {
                match = (ams === "yes") ? "A1 mini Combo (With AMS lite)" : "A1 mini";
                details = "Perfect space-saving profile. Optimized for standard materials with structural reliability.";
            } else {
                match = (ams === "yes") ? "A1 Combo (With AMS lite)" : "A1";
                details = "Full-scale entry platform featuring quick-swap components and high baseline efficiency.";
            }
        } 
        else if (f === "H" || s === "large" || m === "extreme") {
            if (m === "extreme" || b === "flagship") {
                if (laser === "10w") match = "H2C Laser Full Combo (10W)";
                else if (laser === "40w") match = "H2C Laser Full Combo (40W)";
                else match = "H2C Vortek Combo (With AMS 2 Pro)";
                details = "Flagship industrial hardware configuration running dedicated multi-material systems.";
            } else if (b === "performance") {
                if (laser === "10w" || laser === "40w") match = "H2D Laser Combo";
                else if (ams === "yes") match = "H2D Combo (With AMS 2 Pro)";
                else match = "H2D Standard";
                details = "Heavy-duty commercial workhorse managing continuous advanced filament throughput.";
            } else {
                if (laser === "10w" || laser === "40w") match = "H2S Laser Full Combo";
                else if (ams === "yes") match = "H2S Combo (With AMS 2 Pro)";
                else match = "H2S Standard";
                details = "High-scale engineering foundation designed for continuous baseline structural performance.";
            }
            if (b === "flagship" && ams === "no" && laser === "none" && m === "advanced") {
                match = "H2D Pro";
                details = "High-security standalone deployment model for air-gapped industrial workflows.";
            }
        } 
        else {
            if (b === "flagship" || m === "advanced") {
                if (b === "flagship" && m === "advanced" && ams === "no") {
                    match = "X1E";
                    details = "Advanced enterprise terminal with network security profiles and active chamber environmental controls.";
                } else {
                    if (ams === "yes") {
                        match = (b === "flagship") ? "X2D Combo (With AMS)" : "X1-Carbon Combo (With AMS)";
                    } else {
                        match = (b === "flagship") ? "X2D" : "X1-Carbon";
                    }
                    details = "Elite desktop multi-material hardware featuring integrated monitoring arrays and hardened components.";
                }
            } else {
                if (b === "budget") {
                    match = "P1P";
                    details = "Stripped core performance platform optimized for high structural speeds without unnecessary additions.";
                } else {
                    if (ams === "yes") {
                        match = (b === "performance") ? "P2S Combo (With AMS)" : "P1S Combo (With AMS)";
                    } else {
                        match = (b === "performance") ? "P2S" : "P1S";
                    }
                    details = "The golden baseline standard for enclosed continuous manufacturing pipelines.";
                }
            }
        }

        document.getElementById('match-name').innerText = match;
        document.getElementById('match-details').innerHTML = `
            <p>${details}</p>
            <div style="margin-top:15px;">
                <span class="feature-tag">Chassis: ${f === "P_X" ? "CoreXY Desktop" : f === "H" ? "Enterprise Frame" : "Bedslinger"}</span>
                <span class="feature-tag">AMS Bundle: ${ams === "yes" ? "Included" : "None"}</span>
            </div>
        `;
    }

    function resetQuiz() {
        document.getElementById('results-screen').classList.remove('active');
        document.getElementById('intro-screen').classList.add('active');
    }
</script>
</body>
</html>
